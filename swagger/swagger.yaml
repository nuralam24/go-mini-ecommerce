          schema:
            items:
              $ref: '#/definitions/go-ecommerce_internal_models.BrandResponse'
            type: array
      summary: Get all brands
      tags:
      - brands
    post:
      consumes:
      - application/json
      description: Create a new product brand (Admin only)
      parameters:
      - description: Brand data
        in: body
        name: brand
        required: true
        schema:
          $ref: '#/definitions/go-ecommerce_internal_models.CreateBrandRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-ecommerce_internal_models.BrandResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new brand
      tags:
      - brands
  /api/v1/brands/{id}:
