basePath: /
definitions:
  go-ecommerce_internal_database_sqlc.OrderStatus:
    enum:
    - PENDING
    - PROCESSING
    - SHIPPED
    - DELIVERED
    - CANCELLED
    type: string
    x-enum-varnames:
    - OrderStatusPending
    - OrderStatusProcessing
    - OrderStatusShipped
    - OrderStatusDelivered
    - OrderStatusCancelled
  go-ecommerce_internal_models.BrandResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  go-ecommerce_internal_models.CategoryResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  go-ecommerce_internal_models.CreateBrandRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  go-ecommerce_internal_models.CreateCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  go-ecommerce_internal_models.CreateOrderItemRequest:
    properties:
      product_id:
        type: string
      quantity:
        type: integer
    required:
    - product_id
    - quantity
    type: object
  go-ecommerce_internal_models.CreateOrderRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/go-ecommerce_internal_models.CreateOrderItemRequest'
        minItems: 1
        type: array
    required:
    - items
    type: object
  go-ecommerce_internal_models.CreateProductRequest:
    properties:
      brand_id:
        type: string
      category_id:
        type: string
      description:
        type: string
      image_url:
        type: string
      name:
        type: string
      price:
        type: number
      stock:
        minimum: 0
        type: integer
    required:
    - brand_id
    - category_id
    - name
    - price
    type: object
  go-ecommerce_internal_models.CreateUserRequest:
    properties:
      address:
        type: string
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
    required:
    - email
    - name
    - password
    type: object
  go-ecommerce_internal_models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  go-ecommerce_internal_models.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/go-ecommerce_internal_models.UserResponse'
    type: object
  go-ecommerce_internal_models.OrderItemResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      order_id:
        type: string
      price:
        type: number
      product:
        $ref: '#/definitions/go-ecommerce_internal_models.ProductResponse'
      product_id:
        type: string
      quantity:
        type: integer
    type: object
  go-ecommerce_internal_models.OrderResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/go-ecommerce_internal_models.OrderItemResponse'
        type: array
      status:
        $ref: '#/definitions/go-ecommerce_internal_database_sqlc.OrderStatus'
      total_amount:
        type: number
      updated_at:
        type: string
      user:
        $ref: '#/definitions/go-ecommerce_internal_models.UserResponse'
      user_id:
        type: string
    type: object
  go-ecommerce_internal_models.ProductResponse:
    properties:
      brand:
        $ref: '#/definitions/go-ecommerce_internal_models.BrandResponse'
      brand_id:
        type: string
      category:
        $ref: '#/definitions/go-ecommerce_internal_models.CategoryResponse'
      category_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      image_url:
        type: string
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
      updated_at:
        type: string
    type: object
  go-ecommerce_internal_models.UpdateBrandRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  go-ecommerce_internal_models.UpdateCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  go-ecommerce_internal_models.UpdateOrderStatusRequest:
    properties:
      status:
        $ref: '#/definitions/go-ecommerce_internal_database_sqlc.OrderStatus'
    required:
    - status
    type: object
  go-ecommerce_internal_models.UpdateProductRequest:
    properties:
      brand_id:
        type: string
      category_id:
        type: string
      description:
        type: string
      image_url:
        type: string
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
    type: object
  go-ecommerce_internal_models.UserResponse:
    properties:
      address:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: A mini e-commerce API built with Go, PostgreSQL, and sqlc
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Go E-Commerce API
  version: "1.0"
paths:
  /api/v1/admin/login:
    post:
      consumes:
      - application/json
      description: Authenticate admin and return JWT token
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/go-ecommerce_internal_models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-ecommerce_internal_models.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Admin login
      tags:
      - admin
  /api/v1/admin/register:
    post:
      consumes:
      - application/json
      description: Create a new admin account (only for initial setup)
      parameters:
      - description: Admin registration data
        in: body
        name: admin
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new admin
      tags:
      - admin
  /api/v1/brands:
